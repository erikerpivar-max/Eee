<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #1C3B6A;
      font-family: 'Barlow', sans-serif;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .chevron-bg {
      position: absolute;
      right: -80px;
      bottom: -100px;
      opacity: 0.08;
    }
    .content {
      position: relative;
      z-index: 2;
      padding: 90px 100px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .number {
      font-size: 160px;
      font-weight: 900;
      line-height: 1;
      color: rgba(255,255,255,0.08);
      position: absolute;
      top: 60px;
      left: 80px;
    }
    .label {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 30px;
    }
    .title {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      color: white;
      margin-bottom: 50px;
      text-transform: uppercase;
    }
    .divider {
      width: 80px;
      height: 5px;
      background: white;
      margin-bottom: 50px;
      opacity: 0.6;
    }
    .description {
      font-size: 40px;
      font-weight: 300;
      line-height: 1.5;
      color: rgba(255,255,255,0.85);
      max-width: 680px;
    }
    .description strong {
      font-weight: 700;
      color: white;
    }
    .logo {
      position: absolute;
      bottom: 70px;
      right: 90px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <svg class="chevron-bg" width="600" height="700" viewBox="0 0 600 700">
    <polygon points="0,0 160,0 440,350 160,700 0,700 280,350" fill="white"/>
    <polygon points="200,0 360,0 640,350 360,700 200,700 480,350" fill="white"/>
  </svg>

  <div class="number">01</div>

  <div class="content">
    <div class="label">Raison n°1</div>
    <div class="title">Ça claque.</div>
    <div class="divider"></div>
    <div class="description">
      L'effet est <strong>texturé</strong>, c'est nickel.<br>
      Un rendu visuel qui en met plein les yeux.
    </div>
  </div>

  <div class="logo">ixina</div>
</body>
</html>
