<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #1C3B6A;
      font-family: 'Barlow', sans-serif;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .pattern-bg {
      position: absolute;
      inset: 0;
      opacity: 0.04;
    }
    .content {
      position: relative;
      z-index: 2;
      padding: 90px 100px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .number {
      font-size: 160px;
      font-weight: 900;
      color: rgba(255,255,255,0.08);
      position: absolute;
      top: 60px;
      left: 80px;
    }
    .label {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 30px;
    }
    .title {
      font-size: 82px;
      font-weight: 800;
      line-height: 1.05;
      color: white;
      margin-bottom: 50px;
      text-transform: uppercase;
    }
    .divider {
      width: 80px;
      height: 5px;
      background: white;
      margin-bottom: 50px;
      opacity: 0.6;
    }
    .description {
      font-size: 40px;
      font-weight: 300;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
      max-width: 680px;
    }
    .description strong {
      font-weight: 700;
      color: white;
    }
    .logo {
      position: absolute;
      bottom: 70px;
      right: 90px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <!-- Pattern background: repeating X shapes -->
  <svg class="pattern-bg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="xpattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
        <polygon points="10,0 30,0 50,40 30,80 10,80 30,40" fill="none" stroke="white" stroke-width="1.5"/>
        <polygon points="50,0 70,0 90,40 70,80 50,80 70,40" fill="none" stroke="white" stroke-width="1.5"/>
        <polygon points="-10,0 10,0 -10,40" fill="none" stroke="white" stroke-width="1.5"/>
      </pattern>
    </defs>
    <rect width="1080" height="1080" fill="url(#xpattern)"/>
  </svg>

  <div class="number">03</div>

  <div class="content">
    <div class="label">Raison n°3</div>
    <div class="title">Bon rapport<br>qualité-prix.</div>
    <div class="divider"></div>
    <div class="description">
      Un matériel <strong>plaisant</strong> pour votre cuisine<br>
      qui ne coûte <strong>pas très cher</strong>.<br>
      C'est le nerf de la guerre.
    </div>
  </div>

  <div class="logo">ixina</div>
</body>
</html>
