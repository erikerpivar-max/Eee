<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #1C3B6A;
      font-family: 'Barlow', sans-serif;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .chevron-full {
      position: absolute;
      right: -100px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.12;
    }
    .content {
      position: relative;
      z-index: 2;
      padding: 90px 100px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo-big {
      font-size: 80px;
      font-weight: 800;
      letter-spacing: 4px;
      color: white;
      margin-bottom: 60px;
      text-transform: lowercase;
    }
    .divider {
      width: 100px;
      height: 5px;
      background: white;
      margin-bottom: 60px;
      opacity: 0.5;
    }
    .tagline {
      font-size: 52px;
      font-weight: 300;
      line-height: 1.4;
      color: rgba(255,255,255,0.9);
      max-width: 650px;
      margin-bottom: 60px;
    }
    .tagline strong {
      font-weight: 800;
      color: white;
      display: block;
    }
    .cta {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .belgium {
      position: absolute;
      bottom: 70px;
      left: 100px;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- Full X in background -->
  <svg class="chevron-full" width="700" height="900" viewBox="0 0 700 900">
    <!-- right half >> -->
    <polygon points="0,0 180,0 500,450 180,900 0,900 320,450" fill="white"/>
    <polygon points="200,0 380,0 700,450 380,900 200,900 520,450" fill="white"/>
  </svg>

  <div class="content">
    <div class="logo-big">ixina</div>
    <div class="divider"></div>
    <div class="tagline">
      Votre cuisine en stratifié,<br>
      <strong>belle, pratique<br>& accessible.</strong>
    </div>
    <div class="cta">Venez découvrir nos modèles →</div>
  </div>

  <div class="belgium">Belgique</div>
</body>
</html>
